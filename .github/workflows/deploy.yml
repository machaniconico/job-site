name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 各アクション(checkout/setup-node/pnpm/action-setup/upload-artifact/deploy-pages)を
# Node.js 24 ランタイムで実行する。Node20 は 2026-06 以降非推奨のため明示的にオプトインする。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 同時実行は1つに絞る（デプロイの競合回避）。進行中はキャンセルしない。
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        with:
          node-version: 22
          # package-manager は pnpm-lock.yaml から自動検出される

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
